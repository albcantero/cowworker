<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Connie - Classic friendly cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#F5F5F5"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFD4CC"/>
  <!-- Ears -->
  <ellipse cx="20" cy="35" rx="10" ry="6" fill="#F5F5F5" transform="rotate(-30 20 35)"/>
  <ellipse cx="80" cy="35" rx="10" ry="6" fill="#F5F5F5" transform="rotate(30 80 35)"/>
  <!-- Spots -->
  <ellipse cx="35" cy="40" rx="12" ry="10" fill="#4A4A4A"/>
  <ellipse cx="70" cy="45" rx="8" ry="7" fill="#4A4A4A"/>
  <!-- Eyes -->
  <circle cx="38" cy="50" r="5" fill="#2D2D2D"/>
  <circle cx="62" cy="50" r="5" fill="#2D2D2D"/>
  <circle cx="39" cy="49" r="2" fill="white"/>
  <circle cx="63" cy="49" r="2" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="4" fill="#E8A090"/>
  <ellipse cx="56" cy="72" rx="3" ry="4" fill="#E8A090"/>
  <!-- Smile -->
  <path d="M 42 78 Q 50 84 58 78" stroke="#C77D6D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Horns -->
  <path d="M 28 28 Q 25 18 30 15" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 72 28 Q 75 18 70 15" stroke="#D4A574" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
