<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Patches - Multi-spotted disciplined trainer -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FAFAFA"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFE4D4"/>
  <!-- Ears -->
  <ellipse cx="18" cy="35" rx="10" ry="6" fill="#FAFAFA" transform="rotate(-30 18 35)"/>
  <ellipse cx="82" cy="35" rx="10" ry="6" fill="#4A4A4A" transform="rotate(30 82 35)"/>
  <!-- Many patches -->
  <ellipse cx="28" cy="40" rx="10" ry="8" fill="#4A4A4A"/>
  <ellipse cx="45" cy="35" rx="7" ry="6" fill="#8B4513"/>
  <ellipse cx="70" cy="42" rx="12" ry="10" fill="#4A4A4A"/>
  <ellipse cx="55" cy="50" rx="5" ry="4" fill="#8B4513"/>
  <!-- Focused eyes -->
  <circle cx="38" cy="50" r="5" fill="#2D2D2D"/>
  <circle cx="62" cy="50" r="5" fill="#2D2D2D"/>
  <circle cx="39" cy="48" r="2" fill="white"/>
  <circle cx="63" cy="48" r="2" fill="white"/>
  <!-- Slight frown (focused) -->
  <path d="M 33 45 L 43 47" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 67 45 L 57 47" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="4" fill="#D4B4A4"/>
  <ellipse cx="56" cy="72" rx="3" ry="4" fill="#D4B4A4"/>
  <!-- Neutral determined mouth -->
  <path d="M 44 78 L 56 78" stroke="#8B6B5B" stroke-width="2" stroke-linecap="round"/>
  <!-- Whistle -->
  <circle cx="20" cy="70" r="4" fill="#C0C0C0"/>
  <rect x="20" y="68" width="10" height="4" fill="#C0C0C0"/>
</svg>
