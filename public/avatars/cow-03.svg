<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Daisy - Classic Holstein with flower -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FAFAFA"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFE4E1"/>
  <!-- Ears -->
  <ellipse cx="20" cy="35" rx="10" ry="6" fill="#FAFAFA" transform="rotate(-30 20 35)"/>
  <ellipse cx="80" cy="35" rx="10" ry="6" fill="#FAFAFA" transform="rotate(30 80 35)"/>
  <!-- Large spots -->
  <ellipse cx="30" cy="45" rx="15" ry="12" fill="#2D2D2D"/>
  <ellipse cx="75" cy="50" rx="10" ry="8" fill="#2D2D2D"/>
  <ellipse cx="55" cy="35" rx="8" ry="6" fill="#2D2D2D"/>
  <!-- Eyes -->
  <circle cx="38" cy="50" r="5" fill="#2D2D2D"/>
  <circle cx="62" cy="50" r="5" fill="#2D2D2D"/>
  <circle cx="39" cy="49" r="2" fill="white"/>
  <circle cx="63" cy="49" r="2" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="4" fill="#E8B4B4"/>
  <ellipse cx="56" cy="72" rx="3" ry="4" fill="#E8B4B4"/>
  <!-- Smile -->
  <path d="M 43 77 Q 50 82 57 77" stroke="#D4A0A0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Daisy flower on head -->
  <circle cx="70" cy="25" r="3" fill="#FFE135"/>
  <ellipse cx="70" cy="19" rx="3" ry="4" fill="white"/>
  <ellipse cx="76" cy="25" rx="3" ry="4" fill="white" transform="rotate(90 76 25)"/>
  <ellipse cx="70" cy="31" rx="3" ry="4" fill="white"/>
  <ellipse cx="64" cy="25" rx="3" ry="4" fill="white" transform="rotate(90 64 25)"/>
</svg>
