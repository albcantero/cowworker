<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Rosie - Reddish determined worker cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#F5E6E6"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFD4D4"/>
  <!-- Ears -->
  <ellipse cx="18" cy="36" rx="10" ry="6" fill="#F5E6E6" transform="rotate(-30 18 36)"/>
  <ellipse cx="82" cy="36" rx="10" ry="6" fill="#F5E6E6" transform="rotate(30 82 36)"/>
  <!-- Reddish-brown spots -->
  <ellipse cx="30" cy="42" rx="12" ry="10" fill="#A0522D"/>
  <ellipse cx="72" cy="46" rx="9" ry="7" fill="#A0522D"/>
  <ellipse cx="55" cy="35" rx="6" ry="5" fill="#A0522D"/>
  <!-- Determined eyes -->
  <circle cx="38" cy="50" r="5" fill="#3D2B1F"/>
  <circle cx="62" cy="50" r="5" fill="#3D2B1F"/>
  <circle cx="39" cy="49" r="2" fill="white"/>
  <circle cx="63" cy="49" r="2" fill="white"/>
  <!-- Determined eyebrows -->
  <path d="M 32 44 L 42 46" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
  <path d="M 68 44 L 58 46" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="4" fill="#D4A4A4"/>
  <ellipse cx="56" cy="72" rx="3" ry="4" fill="#D4A4A4"/>
  <!-- Confident smile -->
  <path d="M 44 78 Q 50 82 56 78" stroke="#8B4040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Bandana -->
  <path d="M 15 45 Q 50 55 85 45" stroke="#DC143C" stroke-width="3" fill="none"/>
</svg>
