<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Luna - Purple dreamy cow with stars -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#E8E0F0"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#F0E6FF"/>
  <!-- Ears -->
  <ellipse cx="20" cy="35" rx="10" ry="6" fill="#E8E0F0" transform="rotate(-30 20 35)"/>
  <ellipse cx="80" cy="35" rx="10" ry="6" fill="#E8E0F0" transform="rotate(30 80 35)"/>
  <ellipse cx="20" cy="35" rx="6" ry="4" fill="#D4C4E8" transform="rotate(-30 20 35)"/>
  <ellipse cx="80" cy="35" rx="6" ry="4" fill="#D4C4E8" transform="rotate(30 80 35)"/>
  <!-- Spots -->
  <ellipse cx="35" cy="42" rx="10" ry="8" fill="#9B7BB8"/>
  <ellipse cx="68" cy="48" rx="7" ry="6" fill="#9B7BB8"/>
  <!-- Sleepy eyes -->
  <path d="M 33 50 Q 38 48 43 50" stroke="#4A3B5C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 57 50 Q 62 48 67 50" stroke="#4A3B5C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#D4B8E8"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#D4B8E8"/>
  <!-- Peaceful smile -->
  <path d="M 45 78 Q 50 82 55 78" stroke="#9B7BB8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stars -->
  <polygon points="25,20 26,24 30,24 27,27 28,31 25,28 22,31 23,27 20,24 24,24" fill="#FFD700"/>
  <polygon points="78,28 79,31 82,31 80,33 81,36 78,34 75,36 76,33 74,31 77,31" fill="#FFD700" transform="scale(0.7) translate(35 10)"/>
</svg>
