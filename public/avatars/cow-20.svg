<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Sunny - Energetic cheerleader sunshine cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FFFACD"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFE4B5"/>
  <!-- Perky ears -->
  <ellipse cx="16" cy="34" rx="10" ry="6" fill="#FFFACD" transform="rotate(-40 16 34)"/>
  <ellipse cx="84" cy="34" rx="10" ry="6" fill="#FFFACD" transform="rotate(40 84 34)"/>
  <ellipse cx="16" cy="34" rx="6" ry="4" fill="#FFD700" transform="rotate(-40 16 34)"/>
  <ellipse cx="84" cy="34" rx="6" ry="4" fill="#FFD700" transform="rotate(40 84 34)"/>
  <!-- Sunny orange spots -->
  <ellipse cx="30" cy="42" rx="12" ry="10" fill="#FFA500"/>
  <ellipse cx="72" cy="46" rx="10" ry="8" fill="#FFA500"/>
  <!-- Excited big eyes -->
  <circle cx="38" cy="48" r="7" fill="#8B4513"/>
  <circle cx="62" cy="48" r="7" fill="#8B4513"/>
  <circle cx="40" cy="46" r="3" fill="white"/>
  <circle cx="64" cy="46" r="3" fill="white"/>
  <circle cx="36" cy="50" r="1.5" fill="white"/>
  <circle cx="60" cy="50" r="1.5" fill="white"/>
  <!-- Happy eyebrows -->
  <path d="M 30 40 Q 38 36 46 40" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 54 40 Q 62 36 70 40" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Big rosy cheeks -->
  <ellipse cx="26" cy="58" rx="6" ry="4" fill="#FF6B6B" opacity="0.5"/>
  <ellipse cx="74" cy="58" rx="6" ry="4" fill="#FF6B6B" opacity="0.5"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#DEB887"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#DEB887"/>
  <!-- Big excited smile -->
  <path d="M 38 76 Q 50 90 62 76" stroke="#CD853F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 42 80 Q 50 86 58 80" fill="#FFB6C1"/>
  <!-- Sun rays around head -->
  <line x1="50" y1="15" x2="50" y2="8" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="18" x2="70" y2="12" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="18" x2="30" y2="12" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="28" x2="82" y2="25" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="28" x2="18" y2="25" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
</svg>
