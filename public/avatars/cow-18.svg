  <!-- Maple leaf -->
  <path d="M 72 20 L 75 25 L 80 23 L 77 28 L 82 30 L 76 32 L 78 38 L 72 34 L 66 38 L 68 32 L 62 30 L 67 28 L 64 23 L 69 25 Z" fill="#FF4500"/>
  <rect x="71" y="36" width="2" height="6" fill="#8B4513"/>
