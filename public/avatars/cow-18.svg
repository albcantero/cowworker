<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Maple - Calm observer autumn cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FFF5E6"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFE4C4"/>
  <!-- Soft ears -->
  <ellipse cx="18" cy="38" rx="10" ry="6" fill="#FFF5E6" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="10" ry="6" fill="#FFF5E6" transform="rotate(25 82 38)"/>
  <ellipse cx="18" cy="38" rx="6" ry="4" fill="#CD853F" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="6" ry="4" fill="#CD853F" transform="rotate(25 82 38)"/>
