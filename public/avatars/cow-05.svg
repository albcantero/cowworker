<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Blossom - Pink cheerful cow with flowers -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FFF0F5"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFDDE5"/>
  <!-- Ears -->
  <ellipse cx="18" cy="36" rx="10" ry="6" fill="#FFF0F5" transform="rotate(-30 18 36)"/>
  <ellipse cx="82" cy="36" rx="10" ry="6" fill="#FFF0F5" transform="rotate(30 82 36)"/>
  <ellipse cx="18" cy="36" rx="6" ry="4" fill="#FFB6C1" transform="rotate(-30 18 36)"/>
  <ellipse cx="82" cy="36" rx="6" ry="4" fill="#FFB6C1" transform="rotate(30 82 36)"/>
  <!-- Pink spots -->
  <ellipse cx="32" cy="43" rx="11" ry="9" fill="#FFB6C1"/>
  <ellipse cx="70" cy="48" rx="8" ry="6" fill="#FFB6C1"/>
  <!-- Happy eyes -->
  <circle cx="38" cy="50" r="5" fill="#4A3040"/>
  <circle cx="62" cy="50" r="5" fill="#4A3040"/>
  <circle cx="39" cy="48" r="2" fill="white"/>
  <circle cx="63" cy="48" r="2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="28" cy="58" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="72" cy="58" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#F0A0B0"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#F0A0B0"/>
  <!-- Big smile -->
  <path d="M 40 77 Q 50 86 60 77" stroke="#D87093" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cherry blossoms -->
  <circle cx="25" cy="22" r="4" fill="#FFB7C5"/>
  <circle cx="21" cy="19" r="3" fill="#FFB7C5"/>
  <circle cx="29" cy="19" r="3" fill="#FFB7C5"/>
  <circle cx="25" cy="20" r="2" fill="#FFEB3B"/>
</svg>
