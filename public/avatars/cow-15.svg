<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Cleo - Strategic planner with glasses -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#F0F0F8"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#E0E0F0"/>
  <!-- Ears -->
  <ellipse cx="18" cy="36" rx="10" ry="6" fill="#F0F0F8" transform="rotate(-30 18 36)"/>
  <ellipse cx="82" cy="36" rx="10" ry="6" fill="#F0F0F8" transform="rotate(30 82 36)"/>
  <!-- Spots -->
  <ellipse cx="30" cy="42" rx="10" ry="8" fill="#4A4A6A"/>
  <ellipse cx="70" cy="45" rx="9" ry="7" fill="#4A4A6A"/>
  <!-- Glasses -->
  <circle cx="38" cy="50" r="8" fill="none" stroke="#2D2D4D" stroke-width="2"/>
  <circle cx="62" cy="50" r="8" fill="none" stroke="#2D2D4D" stroke-width="2"/>
  <path d="M 46 50 L 54 50" stroke="#2D2D4D" stroke-width="2"/>
  <path d="M 30 48 L 22 45" stroke="#2D2D4D" stroke-width="2"/>
  <path d="M 70 48 L 78 45" stroke="#2D2D4D" stroke-width="2"/>
  <!-- Eyes behind glasses -->
  <circle cx="38" cy="50" r="4" fill="#2D2D4D"/>
  <circle cx="62" cy="50" r="4" fill="#2D2D4D"/>
  <circle cx="39" cy="49" r="1.5" fill="white"/>
  <circle cx="63" cy="49" r="1.5" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#C0C0D8"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#C0C0D8"/>
  <!-- Thoughtful mouth -->
  <path d="M 45 78 Q 50 76 55 78" stroke="#4A4A6A" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
