<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bella - Brown sweet cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#8B6914"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#D4A574"/>
  <!-- Ears -->
  <ellipse cx="18" cy="38" rx="10" ry="6" fill="#8B6914" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="10" ry="6" fill="#8B6914" transform="rotate(25 82 38)"/>
  <ellipse cx="18" cy="38" rx="6" ry="4" fill="#FFB6C1" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="6" ry="4" fill="#FFB6C1" transform="rotate(25 82 38)"/>
  <!-- Face marking -->
  <path d="M 45 30 Q 50 25 55 30 L 55 55 Q 50 60 45 55 Z" fill="#F5F5F5"/>
  <!-- Eyes - big and sweet -->
  <circle cx="36" cy="48" r="7" fill="#2D2D2D"/>
  <circle cx="64" cy="48" r="7" fill="#2D2D2D"/>
  <circle cx="38" cy="46" r="3" fill="white"/>
  <circle cx="66" cy="46" r="3" fill="white"/>
  <!-- Eyelashes -->
  <path d="M 30 42 L 28 38" stroke="#2D2D2D" stroke-width="1.5"/>
  <path d="M 34 40 L 33 36" stroke="#2D2D2D" stroke-width="1.5"/>
  <path d="M 70 42 L 72 38" stroke="#2D2D2D" stroke-width="1.5"/>
  <path d="M 66 40 L 67 36" stroke="#2D2D2D" stroke-width="1.5"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#BA8C5E"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#BA8C5E"/>
  <!-- Happy mouth -->
  <path d="M 40 78 Q 50 86 60 78" stroke="#8B6914" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
