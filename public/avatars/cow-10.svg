<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Millie - All-rounder balanced cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FDF5E6"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFE4C4"/>
  <!-- Ears -->
  <ellipse cx="18" cy="36" rx="10" ry="6" fill="#FDF5E6" transform="rotate(-30 18 36)"/>
  <ellipse cx="82" cy="36" rx="10" ry="6" fill="#FDF5E6" transform="rotate(30 82 36)"/>
  <ellipse cx="18" cy="36" rx="6" ry="4" fill="#DEB887" transform="rotate(-30 18 36)"/>
  <ellipse cx="82" cy="36" rx="6" ry="4" fill="#DEB887" transform="rotate(30 82 36)"/>
  <!-- Balanced spots -->
  <ellipse cx="32" cy="43" rx="10" ry="8" fill="#8B7355"/>
  <ellipse cx="68" cy="45" rx="10" ry="8" fill="#8B7355"/>
  <!-- Friendly eyes -->
  <circle cx="38" cy="50" r="5" fill="#4A3728"/>
  <circle cx="62" cy="50" r="5" fill="#4A3728"/>
  <circle cx="39" cy="49" r="2" fill="white"/>
  <circle cx="63" cy="49" r="2" fill="white"/>
  <!-- Light blush -->
  <ellipse cx="30" cy="58" rx="4" ry="2" fill="#DEB887" opacity="0.4"/>
  <ellipse cx="70" cy="58" rx="4" ry="2" fill="#DEB887" opacity="0.4"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#D4A484"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#D4A484"/>
  <!-- Friendly smile -->
  <path d="M 42 78 Q 50 84 58 78" stroke="#8B6B4B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Bell -->
  <ellipse cx="50" cy="88" rx="6" ry="5" fill="#FFD700"/>
  <circle cx="50" cy="90" r="2" fill="#B8860B"/>
</svg>
