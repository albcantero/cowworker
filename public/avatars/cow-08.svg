<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Clover - Green laid-back drifter cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#F0F5F0"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#E8F0E8"/>
  <!-- Floppy ears -->
  <ellipse cx="16" cy="45" rx="10" ry="6" fill="#F0F5F0" transform="rotate(-50 16 45)"/>
  <ellipse cx="84" cy="45" rx="10" ry="6" fill="#F0F5F0" transform="rotate(50 84 45)"/>
  <ellipse cx="16" cy="45" rx="6" ry="4" fill="#90EE90" transform="rotate(-50 16 45)"/>
  <ellipse cx="84" cy="45" rx="6" ry="4" fill="#90EE90" transform="rotate(50 84 45)"/>
  <!-- Green spots -->
  <ellipse cx="35" cy="44" rx="10" ry="8" fill="#98D8A0"/>
  <ellipse cx="67" cy="50" rx="8" ry="6" fill="#98D8A0"/>
  <!-- Relaxed half-closed eyes -->
  <ellipse cx="38" cy="50" rx="5" ry="3" fill="#3D5C3D"/>
  <ellipse cx="62" cy="50" rx="5" ry="3" fill="#3D5C3D"/>
  <circle cx="39" cy="50" r="1.5" fill="white"/>
  <circle cx="63" cy="50" r="1.5" fill="white"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#B8D4B8"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#B8D4B8"/>
  <!-- Relaxed smile -->
  <path d="M 45 77 Q 50 80 55 77" stroke="#5C8C5C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Four leaf clover -->
  <circle cx="72" cy="22" r="4" fill="#228B22"/>
  <circle cx="78" cy="22" r="4" fill="#228B22"/>
  <circle cx="72" cy="28" r="4" fill="#228B22"/>
  <circle cx="78" cy="28" r="4" fill="#228B22"/>
  <rect x="74" y="30" width="2" height="8" fill="#228B22"/>
</svg>
