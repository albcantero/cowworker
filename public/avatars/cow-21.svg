<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Calavera - Secret skeleton Day of the Dead cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#F5F5F5"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#ECECEC"/>
  <!-- Skull-like ears -->
  <ellipse cx="16" cy="34" rx="10" ry="6" fill="#F5F5F5" transform="rotate(-40 16 34)"/>
  <ellipse cx="84" cy="34" rx="10" ry="6" fill="#F5F5F5" transform="rotate(40 84 34)"/>
  <!-- Eye sockets with flowers -->
  <circle cx="38" cy="48" r="10" fill="#1a1a1a"/>
  <circle cx="62" cy="48" r="10" fill="#1a1a1a"/>
  <!-- Flower in left eye -->
  <circle cx="38" cy="48" r="3" fill="#FF1493"/>
  <circle cx="34" cy="45" r="2" fill="#FF69B4"/>
  <circle cx="42" cy="45" r="2" fill="#FF69B4"/>
  <circle cx="34" cy="51" r="2" fill="#FF69B4"/>
  <circle cx="42" cy="51" r="2" fill="#FF69B4"/>
  <!-- Flower in right eye -->
  <circle cx="62" cy="48" r="3" fill="#00CED1"/>
  <circle cx="58" cy="45" r="2" fill="#40E0D0"/>
  <circle cx="66" cy="45" r="2" fill="#40E0D0"/>
  <circle cx="58" cy="51" r="2" fill="#40E0D0"/>
  <circle cx="66" cy="51" r="2" fill="#40E0D0"/>
  <!-- Nose heart -->
  <path d="M 50 68 L 46 72 Q 44 76 48 78 L 50 76 L 52 78 Q 56 76 54 72 Z" fill="#1a1a1a"/>
  <!-- Decorative patterns on face -->
  <path d="M 28 55 Q 30 60 28 65" stroke="#FF1493" stroke-width="1.5" fill="none"/>
  <path d="M 72 55 Q 70 60 72 65" stroke="#00CED1" stroke-width="1.5" fill="none"/>
  <!-- Teeth smile -->
  <rect x="38" y="80" width="4" height="5" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="43" y="80" width="4" height="5" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="48" y="80" width="4" height="5" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="53" y="80" width="4" height="5" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="58" y="80" width="4" height="5" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Marigold crown -->
  <circle cx="30" cy="25" r="5" fill="#FFA500"/>
  <circle cx="40" cy="20" r="5" fill="#FFD700"/>
  <circle cx="50" cy="18" r="6" fill="#FFA500"/>
  <circle cx="60" cy="20" r="5" fill="#FFD700"/>
  <circle cx="70" cy="25" r="5" fill="#FFA500"/>
  <!-- Forehead jewel -->
  <polygon points="50,28 47,34 53,34" fill="#FF1493"/>
</svg>
