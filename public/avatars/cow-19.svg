<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Pearl - Soft supporter elegant cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#FFFAF5"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#FFF0F0"/>
  <!-- Elegant ears -->
  <ellipse cx="18" cy="38" rx="10" ry="6" fill="#FFFAF5" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="10" ry="6" fill="#FFFAF5" transform="rotate(25 82 38)"/>
  <ellipse cx="18" cy="38" rx="6" ry="4" fill="#FFE4E1" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="6" ry="4" fill="#FFE4E1" transform="rotate(25 82 38)"/>
  <!-- Pearl white spots with iridescence -->
  <ellipse cx="32" cy="44" rx="10" ry="8" fill="#F0E6F0"/>
  <ellipse cx="68" cy="46" rx="8" ry="6" fill="#E6F0F0"/>
  <!-- Soft gentle eyes -->
  <circle cx="38" cy="50" r="5" fill="#6B5B7B"/>
  <circle cx="62" cy="50" r="5" fill="#6B5B7B"/>
  <circle cx="39" cy="48" r="2.5" fill="white"/>
  <circle cx="63" cy="48" r="2.5" fill="white"/>
  <!-- Long eyelashes -->
  <path d="M 30 46 L 27 42" stroke="#6B5B7B" stroke-width="1.5"/>
  <path d="M 33 44 L 31 40" stroke="#6B5B7B" stroke-width="1.5"/>
  <path d="M 36 43 L 35 39" stroke="#6B5B7B" stroke-width="1.5"/>
  <path d="M 70 46 L 73 42" stroke="#6B5B7B" stroke-width="1.5"/>
  <path d="M 67 44 L 69 40" stroke="#6B5B7B" stroke-width="1.5"/>
  <path d="M 64 43 L 65 39" stroke="#6B5B7B" stroke-width="1.5"/>
  <!-- Soft blush -->
  <ellipse cx="28" cy="58" rx="5" ry="3" fill="#FFE4E1" opacity="0.6"/>
  <ellipse cx="72" cy="58" rx="5" ry="3" fill="#FFE4E1" opacity="0.6"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="3" ry="3" fill="#E8D8D8"/>
  <ellipse cx="56" cy="72" rx="3" ry="3" fill="#E8D8D8"/>
  <!-- Soft smile -->
  <path d="M 43 77 Q 50 82 57 77" stroke="#9B8B8B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Pearl necklace -->
  <circle cx="35" cy="85" r="3" fill="#F5F5F5" stroke="#E0E0E0"/>
  <circle cx="43" cy="87" r="3" fill="#F5F5F5" stroke="#E0E0E0"/>
  <circle cx="50" cy="88" r="3" fill="#F5F5F5" stroke="#E0E0E0"/>
  <circle cx="57" cy="87" r="3" fill="#F5F5F5" stroke="#E0E0E0"/>
  <circle cx="65" cy="85" r="3" fill="#F5F5F5" stroke="#E0E0E0"/>
</svg>
