<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Bessie - Tough love classic cow -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#F5F0E8"/>
  <ellipse cx="50" cy="70" rx="20" ry="15" fill="#E8D4C4"/>
  <!-- Strong ears -->
  <ellipse cx="18" cy="34" rx="10" ry="6" fill="#F5F0E8" transform="rotate(-35 18 34)"/>
  <ellipse cx="82" cy="34" rx="10" ry="6" fill="#F5F0E8" transform="rotate(35 82 34)"/>
  <!-- Bold spots -->
  <ellipse cx="28" cy="40" rx="14" ry="12" fill="#5C4033"/>
  <ellipse cx="72" cy="44" rx="12" ry="10" fill="#5C4033"/>
  <!-- Determined eyes -->
  <circle cx="38" cy="50" r="5" fill="#2D1F14"/>
  <circle cx="62" cy="50" r="5" fill="#2D1F14"/>
  <circle cx="39" cy="49" r="2" fill="white"/>
  <circle cx="63" cy="49" r="2" fill="white"/>
  <!-- Thick eyebrows -->
  <path d="M 30 44 L 44 47" stroke="#2D1F14" stroke-width="3" stroke-linecap="round"/>
  <path d="M 70 44 L 56 47" stroke="#2D1F14" stroke-width="3" stroke-linecap="round"/>
  <!-- Nostrils -->
  <ellipse cx="44" cy="72" rx="4" ry="4" fill="#C4A484"/>
  <ellipse cx="56" cy="72" rx="4" ry="4" fill="#C4A484"/>
  <!-- Smirk -->
  <path d="M 44 78 Q 52 82 58 76" stroke="#5C4033" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cowboy hat -->
  <ellipse cx="50" cy="22" rx="25" ry="6" fill="#8B4513"/>
  <rect x="35" y="12" width="30" height="12" rx="3" fill="#8B4513"/>
</svg>
