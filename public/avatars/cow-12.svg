  <ellipse cx="18" cy="38" rx="10" ry="6" fill="#F5FFF5" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="10" ry="6" fill="#F5FFF5" transform="rotate(25 82 38)"/>
  <ellipse cx="18" cy="38" rx="6" ry="4" fill="#B8E0B8" transform="rotate(-25 18 38)"/>
  <ellipse cx="82" cy="38" rx="6" ry="4" fill="#B8E0B8" transform="rotate(25 82 38)"/>
  <!-- Soft green spots -->
  <ellipse cx="33" cy="44" rx="10" ry="8" fill="#90C890"/>
  <ellipse cx="68" cy="48" rx="8" ry="6" fill="#90C890"/>
