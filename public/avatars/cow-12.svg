  <!-- Gentle smile -->
  <path d="M 43 77 Q 50 82 57 77" stroke="#5C8C5C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Flower crown -->
  <circle cx="35" cy="25" r="4" fill="#FF69B4"/>
  <circle cx="50" cy="22" r="5" fill="#FFB6C1"/>
  <circle cx="65" cy="25" r="4" fill="#FF69B4"/>
  <circle cx="42" cy="20" r="3" fill="#FFA07A"/>
  <circle cx="58" cy="20" r="3" fill="#FFA07A"/>
